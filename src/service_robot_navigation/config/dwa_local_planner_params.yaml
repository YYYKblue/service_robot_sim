DWAPlannerROS:
  # Translational velocity limits. Nonzero Y limits and vy_samples enable holonomic motion.
  max_vel_x: 0.45
  min_vel_x: -0.30
  max_vel_y: 0.35
  min_vel_y: -0.35
  max_vel_trans: 0.45
  min_vel_trans: 0.04

  # Rotational velocity limits
  max_vel_theta: 1.00
  min_vel_theta: 0.20

  # Acceleration limits
  acc_lim_x: 0.80
  acc_lim_y: 0.80
  acc_lim_theta: 1.50

  # Sampling
  vx_samples: 12
  vy_samples: 12
  vth_samples: 24
  sim_time: 1.7
  sim_granularity: 0.025
  angular_sim_granularity: 0.025

  # Goal tolerances
  xy_goal_tolerance: 0.08
  yaw_goal_tolerance: 0.08
  latch_xy_goal_tolerance: true

  # Trajectory scoring
  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 0.05
  forward_point_distance: 0.10
  stop_time_buffer: 0.20
  scaling_speed: 0.25
  max_scaling_factor: 0.20

  # Oscillation and plan handling
  oscillation_reset_dist: 0.10
  oscillation_reset_angle: 0.20
  prune_plan: true
  publish_traj_pc: false
  publish_cost_grid_pc: false
