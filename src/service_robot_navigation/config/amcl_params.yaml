# Frame configuration
base_frame_id: base_footprint
odom_frame_id: odom
global_frame_id: map
tf_broadcast: true
transform_tolerance: 0.3

# Particle filter
min_particles: 300
max_particles: 1000
kld_err: 0.02
kld_z: 0.99
update_min_d: 0.05
update_min_a: 0.08
resample_interval: 1
recovery_alpha_slow: 0.0
recovery_alpha_fast: 0.0
gui_publish_rate: 10.0
save_pose_rate: 0.5

# Laser model
laser_min_range: 0.08
laser_max_range: 8.0
laser_max_beams: 120
laser_model_type: likelihood_field
laser_z_hit: 0.85
laser_z_short: 0.05
laser_z_max: 0.05
laser_z_rand: 0.05
laser_sigma_hit: 0.10
laser_lambda_short: 0.10
laser_likelihood_max_dist: 2.0

# Critical for an omnidirectional base.
odom_model_type: omni
odom_alpha1: 0.02
odom_alpha2: 0.02
odom_alpha3: 0.02
odom_alpha4: 0.02
odom_alpha5: 0.02
