# Frames and timing
base_frame: base_footprint
odom_frame: odom
map_frame: map
map_update_interval: 2.0
transform_publish_period: 0.05

# Laser model: the simulated lidar publishes 0.08-8.0 m scans.
maxUrange: 7.5
maxRange: 8.0
sigma: 0.05
kernelSize: 1
lstep: 0.05
astep: 0.05
iterations: 5
lsigma: 0.075
ogain: 3.0
lskip: 0
minimumScore: 30.0

# Odometry motion model. Low values are suitable for the ideal planar Gazebo plugin.
srr: 0.02
srt: 0.02
str: 0.02
stt: 0.02

# Map updates
linearUpdate: 0.08
angularUpdate: 0.08
temporalUpdate: 1.0
resampleThreshold: 0.5
particles: 30
xmin: -5.0
ymin: -5.0
xmax: 20.0
ymax: 20.0
delta: 0.05
llsamplerange: 0.01
llsamplestep: 0.01
lasamplerange: 0.005
lasamplestep: 0.005
