# The physical chassis radius is 0.25 m. The extra 0.02 m is a safety margin.
robot_radius: 0.27
footprint_padding: 0.01

transform_tolerance: 0.3
map_type: costmap
obstacle_range: 3.0
raytrace_range: 3.5

inflation_layer:
  enabled: true
  inflation_radius: 0.38
  cost_scaling_factor: 8.0

obstacle_layer:
  enabled: true
  observation_sources: laser_scan_sensor
  laser_scan_sensor:
    sensor_frame: lidar_link
    data_type: LaserScan
    topic: /scan
    marking: true
    clearing: true
    obstacle_range: 3.0
    raytrace_range: 3.5
    inf_is_valid: false
