# The simulated chassis radius is 0.25 m. Narrow doors are part of the test map,
# so avoid adding padding here; use inflation costs for clearance preference.
robot_radius: 0.25
footprint_padding: 0.0

transform_tolerance: 0.3
map_type: costmap
obstacle_range: 3.0
raytrace_range: 3.5

inflation_layer:
  enabled: true
  inflation_radius: 0.26
  cost_scaling_factor: 12.0

obstacle_layer:
  enabled: true
  observation_sources: laser_scan_sensor
  laser_scan_sensor:
    sensor_frame: lidar_link
    data_type: LaserScan
    topic: /scan
    marking: true
    clearing: true
    obstacle_range: 3.0
    raytrace_range: 3.5
    inf_is_valid: false
