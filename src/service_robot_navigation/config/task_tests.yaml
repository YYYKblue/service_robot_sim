defaults:
  frame_id: map
  timeout: 90.0
  hold_time: 1.0
  xy_tolerance: 0.25
  yaw_tolerance: 0.25
  initialize_amcl: true
  initial_pose: [2.0, 8.05, 1.5708]

tasks:
  - name: task_1_take_medicine_to_ward_a
    description: Take medicine at the nurse station and deliver it to ward A.
    waypoints:
      - name: take_medicine
        pose: [2.0, 8.05, 1.5708]
        hold_time: 2.0
      - name: ward_a
        pose: [11.3, 7.85, 1.5708]
        hold_time: 2.0

  - name: task_2_take_medicine_to_ward_b
    description: Take medicine at the nurse station and deliver it to ward B.
    waypoints:
      - name: ward_a_door
        pose: [10.35, 6.15, -1.5708]
        xy_tolerance: 0.30
        yaw_tolerance: 0.35
      - name: staggered_exit
        pose: [8.4, 6.4, 3.1416]
        xy_tolerance: 0.30
        yaw_tolerance: 0.35
      - name: staggered_mid
        pose: [6.55, 7.15, 3.1416]
        xy_tolerance: 0.30
        yaw_tolerance: 0.35
      - name: staggered_entry
        pose: [4.5, 8.0, 3.1416]
        xy_tolerance: 0.30
        yaw_tolerance: 0.35
      - name: take_medicine
        pose: [2.0, 8.05, 1.5708]
        hold_time: 2.0
      - name: ward_b
        pose: [5.15, 2.4, 3.1416]
        hold_time: 2.0

  - name: task_3_long_counter_service
    description: Sequentially serve three people at the long counter service area.
    waypoints:
      - name: long_counter_left
        pose: [1.55, 2.15, 1.5708]
        hold_time: 1.5
      - name: long_counter_middle
        pose: [2.5, 2.15, 1.5708]
        hold_time: 1.5
      - name: long_counter_right
        pose: [3.05, 2.15, 1.5708]
        hold_time: 1.5
        xy_tolerance: 0.30

  - name: task_4_staggered_channel
    description: Traverse the horizontal staggered channel through required intermediate poses.
    waypoints:
      - name: staggered_entry
        pose: [4.5, 8.0, 0.0]
        xy_tolerance: 0.30
        yaw_tolerance: 0.35
      - name: staggered_mid
        pose: [6.55, 7.15, -1.5708]
        xy_tolerance: 0.30
        yaw_tolerance: 0.35
      - name: staggered_exit
        pose: [8.4, 6.4, 0.0]
        xy_tolerance: 0.30
        yaw_tolerance: 0.35

  - name: task_5_narrow_area_to_dock
    description: Pass through the narrow area and finish at the docking point.
    waypoints:
      - name: narrow_entry
        pose: [7.2, 2.5, 0.0]
      - name: narrow_mid
        pose: [9.0, 2.5, 0.0]
      - name: narrow_exit
        pose: [11.4, 2.5, 0.0]
      - name: dock
        pose: [13.25, 2.6, 0.0]
        hold_time: 2.0
